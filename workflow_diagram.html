    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        
            <div id="config"></div>
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#32CD32", "font": {"color": "white"}, "id": "START", "label": "StartEvent", "shape": "box"}, {"color": "#FF4500", "font": {"color": "white"}, "id": "STOP", "label": "StopEvent", "shape": "box"}, {"color": "#40E0D0", "font": {"color": "white"}, "id": "Router", "label": "src.workflows.steps.router", "level": 1, "shape": "box"}, {"color": "#40E0D0", "font": {"color": "white"}, "id": "Retrieval", "label": "src.workflows.steps.retrieval", "level": 1, "shape": "box"}, {"color": "#40E0D0", "font": {"color": "white"}, "id": "StructuredQuery", "label": "src.workflows.steps.structured_query", "level": 1, "shape": "box"}, {"color": "#40E0D0", "font": {"color": "white"}, "id": "Generator", "label": "src.workflows.steps.generator", "level": 1, "shape": "box"}, {"color": "#40E0D0", "font": {"color": "white"}, "id": "InputGuard", "label": "src.workflows.steps.input_guard", "level": 1, "shape": "box"}, {"color": "#FF7F50", "font": {"color": "white"}, "id": "RetrievalEvent", "label": "RetrievalEvent", "shape": "ellipse"}, {"color": "#FF7F50", "font": {"color": "white"}, "id": "StructuredQueryEvent", "label": "StructuredQueryEvent", "shape": "ellipse"}, {"color": "#FF7F50", "font": {"color": "white"}, "id": "InputValidatedEvent", "label": "InputValidatedEvent", "shape": "ellipse"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "START", "to": "InputGuard"}, {"arrows": "to", "from": "InputGuard", "to": "InputValidatedEvent"}, {"arrows": "to", "from": "InputValidatedEvent", "to": "Router"}, {"arrows": "to", "from": "Router", "label": "Semantic Path", "to": "RetrievalEvent"}, {"arrows": "to", "from": "Router", "label": "Structured Path", "to": "StructuredQueryEvent"}, {"arrows": "to", "from": "RetrievalEvent", "to": "Retrieval"}, {"arrows": "to", "from": "StructuredQueryEvent", "to": "StructuredQuery"}, {"arrows": "to", "from": "Retrieval", "to": "Generator"}, {"arrows": "to", "from": "StructuredQuery", "to": "Generator"}, {"arrows": "to", "from": "Generator", "to": "STOP"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  
                  // if this network requires displaying the configure window,
                  // put it in its div
                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
